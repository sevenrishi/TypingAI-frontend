    <rect x="22" y="170" width="266" height="26" rx="11" fill="#0b1529" stroke="#244161" />
  </g>

  <text x="132" y="452" fill="#7dd3fc" font-size="23" font-family="Consolas, monospace" letter-spacing="1.3">AI typing coach for speed, accuracy, and focus</text>
