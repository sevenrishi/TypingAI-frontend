<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="TypingAI social preview image">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040816" />
      <stop offset="45%" stop-color="#0c1c3a" />
      <stop offset="100%" stop-color="#0b2a2c" />
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 90) rotate(34) scale(520 320)">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1100 540) rotate(12) scale(440 300)">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#34d399" stop-opacity="0" />
