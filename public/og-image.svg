    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14314f" />
      <stop offset="100%" stop-color="#18373f" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
