  <text x="132" y="270" fill="#bfd2f8" font-size="31" font-family="Segoe UI, Arial, sans-serif" font-weight="500">Train faster. Type cleaner. Track real progress.</text>
  <rect x="132" y="303" width="470" height="10" rx="5" fill="url(#line)" />

  <g font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="600" fill="#c8defd">
