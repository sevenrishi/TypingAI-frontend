      <g>
        <rect x="22" y="92" width="56" height="52" rx="12" fill="#132b4b" stroke="#2c5888" />
        <text x="50" y="126" fill="#22d3ee" font-size="20">J</text>

        <rect x="92" y="92" width="56" height="52" rx="12" fill="#132b4b" stroke="#2c5888" />
